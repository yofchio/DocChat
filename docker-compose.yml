services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "8000:8000"
    # Use a separate dir from ./surreal_data so local legacy DB files do not break v2 image startup.
    volumes:
      - ./surreal_data_docker:/mydata
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5055:5055"
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=my_notebook
      - SURREAL_DATABASE=my_notebook
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-google}
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-gemini-2.0-flash}
    volumes:
      - ./data:/app/data
    depends_on:
      - surrealdb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://api:5055
    depends_on:
      - api
    restart: always
